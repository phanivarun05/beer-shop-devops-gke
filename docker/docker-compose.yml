name: beer-shop

services:
#infrastructure
  mysql:
    image: mysql:8.4
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: dangerous
      MYSQL_DATABASE: test

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - beer-shop-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdangerous"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:8
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb-data:/data/db

    networks:
      - beer-shop-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    ports:
      - "6379:6379"

    networks:
      - beer-shop-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  consul:
    image: hashicorp/consul:1.21

    command: agent -dev -client=0.0.0.0

    restart: unless-stopped

    ports:
      - "8500:8500"

    networks:
      - beer-shop-network

    volumes:
      - consul-data:/consul/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.1

    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka-data:/var/lib/kafka/data

    networks:
      - beer-shop-network

  jaeger:
    image: jaegertracing/all-in-one:1.76.0

    restart: unless-stopped

    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14268:14268"   # Jaeger collector HTTP

    environment:
      COLLECTOR_OTLP_ENABLED: "true"

    networks:
      - beer-shop-network

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

#backend
  catalog:
    build:
     context: ../
     dockerfile: docker/generic/Dockerfile
     args:
       SERVICE_PATH: catalog/service

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      kafka:
        condition: service_started  

    networks:
      - beer-shop-network


  #cart:

  #user:

  #order:

  #payment:

  #shipping:

  #courier:

#frontend
  #shop-interface:

  #shop-admin:

networks:
  beer-shop-network:
    driver: bridge

volumes:
  mysql-data:
  mongodb-data:
  kafka-data:
  consul-data:
